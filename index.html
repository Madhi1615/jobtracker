<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job Application Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0f13;
      --surface: #16181f;
      --surface2: #1e2028;
      --border: #2a2d38;
      --text: #e8eaf0;
      --muted: #6b7080;
      --accent: #c8f060;
      --accent-dim: rgba(200, 240, 96, 0.12);

      --applied:   #4a9eff;
      --applied-bg: rgba(74,158,255,0.12);
      --interview: #f0a040;
      --interview-bg: rgba(240,160,64,0.12);
      --offer:     #50d890;
      --offer-bg:  rgba(80,216,144,0.12);
      --rejected:  #ff5f6d;
      --rejected-bg: rgba(255,95,109,0.12);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── Noise texture overlay ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 0; opacity: 0.6;
    }

    .wrap { max-width: 1100px; margin: 0 auto; padding: 0 24px; position: relative; z-index: 1; }

    /* ── Header ── */
    header {
      padding: 48px 0 36px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 36px;
    }
    .header-inner { display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 20px; }

    .logo-area h1 {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(26px, 5vw, 42px);
      letter-spacing: -1.5px;
      line-height: 1;
    }
    .logo-area h1 span {
      color: var(--accent);
      display: inline-block;
    }
    .logo-area p {
      color: var(--muted);
      margin-top: 8px;
      font-size: 14px;
    }

    .header-meta {
      text-align: right;
    }
    .last-updated {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
    }

    /* ── Stats bar ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px 20px;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.15s;
    }
    .stat-card:hover { transform: translateY(-2px); }
    .stat-card.active { border-color: var(--card-color, var(--accent)); }
    .stat-card::after {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: var(--card-color, var(--border));
      border-radius: 12px 12px 0 0;
    }
    .stat-card[data-filter="All"]      { --card-color: var(--accent); }
    .stat-card[data-filter="Applied"]  { --card-color: var(--applied); }
    .stat-card[data-filter="Interview"]{ --card-color: var(--interview); }
    .stat-card[data-filter="Offer"]    { --card-color: var(--offer); }
    .stat-card[data-filter="Rejected"] { --card-color: var(--rejected); }

    .stat-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      font-weight: 600;
    }
    .stat-num {
      font-family: 'Syne', sans-serif;
      font-size: 36px;
      font-weight: 800;
      line-height: 1;
      margin: 6px 0 0;
    }
    .stat-card[data-filter="Applied"]   .stat-num { color: var(--applied); }
    .stat-card[data-filter="Interview"] .stat-num { color: var(--interview); }
    .stat-card[data-filter="Offer"]     .stat-num { color: var(--offer); }
    .stat-card[data-filter="Rejected"]  .stat-num { color: var(--rejected); }
    .stat-card[data-filter="All"]       .stat-num { color: var(--accent); }

    /* ── Progress bar ── */
    .pipeline {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 24px;
      margin-bottom: 32px;
    }
    .pipeline-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      margin-bottom: 12px;
      font-weight: 600;
    }
    .pipeline-bar {
      height: 10px;
      border-radius: 99px;
      background: var(--border);
      overflow: hidden;
      display: flex;
      gap: 2px;
    }
    .pipeline-segment {
      height: 100%;
      border-radius: 99px;
      transition: width 0.6s ease;
    }
    .pipeline-legend {
      display: flex; gap: 20px; flex-wrap: wrap;
      margin-top: 12px;
    }
    .legend-item {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--muted);
    }
    .legend-dot {
      width: 8px; height: 8px; border-radius: 50%;
    }

    /* ── Controls ── */
    .controls {
      display: flex; gap: 12px; flex-wrap: wrap;
      margin-bottom: 20px; align-items: center;
    }
    .search-wrap {
      flex: 1;
      min-width: 200px;
      position: relative;
    }
    .search-wrap svg {
      position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
      color: var(--muted); pointer-events: none;
    }
    .search-input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 10px 14px 10px 38px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-input::placeholder { color: var(--muted); }
    .search-input:focus { border-color: var(--accent); }

    .sort-select {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .sort-select:focus { border-color: var(--accent); }

    .results-count {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 14px;
    }
    .results-count strong { color: var(--text); }

    /* ── Job Cards ── */
    .jobs-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .job-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 22px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 16px;
      align-items: start;
      transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s;
      animation: fadeUp 0.3s ease both;
    }
    .job-card:hover {
      border-color: #3a3e4d;
      transform: translateX(3px);
      box-shadow: -3px 0 0 var(--card-status-color, var(--border));
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .job-card[data-status="Applied"]   { --card-status-color: var(--applied); }
    .job-card[data-status="Interview"] { --card-status-color: var(--interview); }
    .job-card[data-status="Offer"]     { --card-status-color: var(--offer); }
    .job-card[data-status="Rejected"]  { --card-status-color: var(--rejected); }

    .job-index {
      font-family: 'Syne', sans-serif;
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      padding-top: 3px;
      min-width: 24px;
    }

    .job-main {}
    .job-title {
      font-family: 'Syne', sans-serif;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.3px;
      line-height: 1.2;
    }
    .job-company {
      font-size: 14px;
      color: var(--muted);
      margin-top: 3px;
    }
    .job-company a {
      color: var(--accent);
      text-decoration: none;
      opacity: 0.85;
    }
    .job-company a:hover { opacity: 1; text-decoration: underline; }

    .job-notes {
      font-size: 13px;
      color: var(--muted);
      margin-top: 8px;
      font-style: italic;
      line-height: 1.5;
    }

    .job-meta { text-align: right; }
    .job-status {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }
    .job-status.Applied   { background: var(--applied-bg);   color: var(--applied); }
    .job-status.Interview { background: var(--interview-bg); color: var(--interview); }
    .job-status.Offer     { background: var(--offer-bg);     color: var(--offer); }
    .job-status.Rejected  { background: var(--rejected-bg);  color: var(--rejected); }
    .status-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: currentColor;
    }

    .job-date {
      font-size: 12px;
      color: var(--muted);
      margin-top: 6px;
      white-space: nowrap;
    }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: 64px 24px;
      color: var(--muted);
    }
    .empty-state svg { opacity: 0.3; margin-bottom: 16px; }
    .empty-state h3 { font-family: 'Syne', sans-serif; color: var(--text); margin-bottom: 8px; }

    /* ── Error / loading ── */
    .loading {
      text-align: center;
      padding: 80px 24px;
      color: var(--muted);
      font-size: 14px;
    }
    .error-box {
      background: rgba(255, 95, 109, 0.08);
      border: 1px solid rgba(255, 95, 109, 0.3);
      border-radius: 10px;
      padding: 20px 24px;
      margin: 32px 0;
      color: var(--rejected);
    }
    .error-box strong { display: block; margin-bottom: 6px; font-family: 'Syne', sans-serif; }
    .error-box code {
      background: rgba(255,255,255,0.06);
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 13px;
    }

    /* ── Footer ── */
    footer {
      margin-top: 64px;
      padding: 28px 0;
      border-top: 1px solid var(--border);
      text-align: center;
      color: var(--muted);
      font-size: 12px;
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .job-card { grid-template-columns: auto 1fr; }
      .job-meta { grid-column: 2; display: flex; gap: 10px; align-items: center; }
    }
  </style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="header-inner">
      <div class="logo-area">
        <h1>Job <span>Tracker</span></h1>
        <p>Your personal application pipeline — clear, simple, always up to date.</p>
      </div>
      <div class="header-meta">
        <div class="last-updated" id="lastUpdated"></div>
      </div>
    </div>
  </header>

  <div id="app">
    <div class="loading">Loading your applications…</div>
  </div>

</div>

<footer>
  <div class="wrap">
    To add a new job, edit <code>jobs.json</code> in your GitHub repo · Hosted free on GitHub Pages
  </div>
</footer>

<script>
// ── Status config ──────────────────────────────────────────────────────────────
const STATUS = {
  Applied:   { color: '#4a9eff', label: 'Applied' },
  Interview: { color: '#f0a040', label: 'Interview' },
  Offer:     { color: '#50d890', label: 'Offer' },
  Rejected:  { color: '#ff5f6d', label: 'Rejected' },
};

// ── State ──────────────────────────────────────────────────────────────────────
let allJobs = [];
let activeFilter = 'All';
let searchQuery = '';
let sortOrder = 'date-desc';

// ── Helpers ────────────────────────────────────────────────────────────────────
function formatDate(str) {
  if (!str) return '—';
  const d = new Date(str + 'T00:00:00');
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function timeSince(str) {
  if (!str) return '';
  const diff = Date.now() - new Date(str + 'T00:00:00').getTime();
  const days = Math.floor(diff / 86400000);
  if (days === 0) return 'Today';
  if (days === 1) return 'Yesterday';
  if (days < 7)  return `${days}d ago`;
  if (days < 30) return `${Math.floor(days/7)}w ago`;
  return `${Math.floor(days/30)}mo ago`;
}

function escape(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Count jobs by status ───────────────────────────────────────────────────────
function counts() {
  const c = { All: allJobs.length, Applied: 0, Interview: 0, Offer: 0, Rejected: 0 };
  allJobs.forEach(j => { if (c[j.status] !== undefined) c[j.status]++; });
  return c;
}

// ── Filter + sort ──────────────────────────────────────────────────────────────
function filtered() {
  let list = allJobs.filter(j => {
    const matchStatus = activeFilter === 'All' || j.status === activeFilter;
    const q = searchQuery.toLowerCase();
    const matchSearch = !q || j.company.toLowerCase().includes(q) || j.title.toLowerCase().includes(q) || (j.notes || '').toLowerCase().includes(q);
    return matchStatus && matchSearch;
  });

  list.sort((a, b) => {
    if (sortOrder === 'date-desc') return new Date(b.date) - new Date(a.date);
    if (sortOrder === 'date-asc')  return new Date(a.date) - new Date(b.date);
    if (sortOrder === 'company')   return a.company.localeCompare(b.company);
    if (sortOrder === 'status')    return a.status.localeCompare(b.status);
    return 0;
  });

  return list;
}

// ── Render ─────────────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  const c = counts();
  const jobs = filtered();

  const totalForBar = allJobs.length || 1;
  const segments = ['Applied','Interview','Offer','Rejected'].map(s => ({
    status: s,
    pct: ((c[s] / totalForBar) * 100).toFixed(1),
    color: STATUS[s].color,
  })).filter(s => s.pct > 0);

  app.innerHTML = `
    <!-- Stats -->
    <div class="stats-grid">
      ${['All','Applied','Interview','Offer','Rejected'].map(s => `
        <div class="stat-card ${s === activeFilter ? 'active' : ''}" data-filter="${s}" onclick="setFilter('${s}')">
          <div class="stat-label">${s === 'All' ? 'Total' : s}</div>
          <div class="stat-num">${c[s]}</div>
        </div>
      `).join('')}
    </div>

    <!-- Pipeline bar -->
    <div class="pipeline">
      <div class="pipeline-label">Application Pipeline</div>
      <div class="pipeline-bar">
        ${segments.map(s => `
          <div class="pipeline-segment" style="width:${s.pct}%; background:${s.color};"></div>
        `).join('')}
      </div>
      <div class="pipeline-legend">
        ${['Applied','Interview','Offer','Rejected'].map(s => `
          <div class="legend-item">
            <div class="legend-dot" style="background:${STATUS[s].color};"></div>
            ${s} · ${c[s]}
          </div>
        `).join('')}
      </div>
    </div>

    <!-- Controls -->
    <div class="controls">
      <div class="search-wrap">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input class="search-input" id="searchInput" placeholder="Search companies, titles, notes…"
          value="${escape(searchQuery)}" oninput="setSearch(this.value)" />
      </div>
      <select class="sort-select" onchange="setSort(this.value)">
        <option value="date-desc" ${sortOrder==='date-desc'?'selected':''}>Newest first</option>
        <option value="date-asc"  ${sortOrder==='date-asc'?'selected':''}>Oldest first</option>
        <option value="company"   ${sortOrder==='company'?'selected':''}>Company A–Z</option>
        <option value="status"    ${sortOrder==='status'?'selected':''}>By status</option>
      </select>
    </div>

    <div class="results-count">Showing <strong>${jobs.length}</strong> of <strong>${allJobs.length}</strong> applications</div>

    <!-- Job list -->
    <div class="jobs-list" id="jobsList">
      ${jobs.length === 0 ? `
        <div class="empty-state">
          <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
          </svg>
          <h3>No applications found</h3>
          <p>${searchQuery ? 'Try a different search term.' : 'Add your first job to jobs.json!'}</p>
        </div>
      ` : jobs.map((j, i) => `
        <div class="job-card" data-status="${escape(j.status)}" style="animation-delay:${i*30}ms">
          <div class="job-index">${String(i+1).padStart(2,'0')}</div>
          <div class="job-main">
            <div class="job-title">${escape(j.title)}</div>
            <div class="job-company">
              ${j.link
                ? `<a href="${escape(j.link)}" target="_blank" rel="noopener">${escape(j.company)} ↗</a>`
                : escape(j.company)
              }
            </div>
            ${j.notes ? `<div class="job-notes">${escape(j.notes)}</div>` : ''}
          </div>
          <div class="job-meta">
            <span class="job-status ${escape(j.status)}">
              <span class="status-dot"></span>${escape(j.status)}
            </span>
            <div class="job-date">${formatDate(j.date)}</div>
            <div class="job-date" style="opacity:0.6">${timeSince(j.date)}</div>
          </div>
        </div>
      `).join('')}
    </div>
  `;
}

// ── Event handlers ─────────────────────────────────────────────────────────────
function setFilter(f) { activeFilter = f; render(); }
function setSearch(v) { searchQuery = v; render(); }
function setSort(v)   { sortOrder = v; render(); }

// ── Load data ──────────────────────────────────────────────────────────────────
async function loadJobs() {
  const app = document.getElementById('app');
  try {
    const res = await fetch('jobs.json?v=' + Date.now());
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    allJobs = await res.json();

    // Set last updated date
    if (allJobs.length > 0) {
      const latest = allJobs.map(j => j.date).filter(Boolean).sort().reverse()[0];
      document.getElementById('lastUpdated').textContent = 'Last entry: ' + formatDate(latest);
    }

    render();
  } catch (err) {
    app.innerHTML = `
      <div class="error-box">
        <strong>⚠ Could not load jobs.json</strong>
        Make sure <code>jobs.json</code> is in the same folder as <code>index.html</code> in your GitHub repo.
        <br><br>Error: ${escape(err.message)}
      </div>
    `;
  }
}

loadJobs();
</script>
</body>
</html>
